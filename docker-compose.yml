version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: facilita-backend
    volumes:
      - ./backend:/app
      - /app/node_modules
    ports:
      - "3333:3333"
    env_file:
      - ./backend/.env
    networks:
      - facilita-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: facilita-frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    networks:
      - facilita-network
    depends_on:
      - backend
    restart: unless-stopped

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: facilita-nginx
    ports:
      - "8090:80"
    depends_on:
      - frontend
      - backend
    networks:
      - facilita-network
    restart: unless-stopped

networks:
  facilita-network:
    driver: bridge
