version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: facilita-postgres
    environment:
      POSTGRES_USER: facilita
      POSTGRES_PASSWORD: facilita123
      POSTGRES_DB: facilita_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - facilita-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U facilita -d facilita_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: facilita-backend
    volumes:
      - ./backend:/app
      - /app/node_modules
    ports:
      - "3333:3333"
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://facilita:facilita123@postgres:5432/facilita_db
    networks:
      - facilita-network
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: facilita-frontend
    ports:
      - "5173:80"
    networks:
      - facilita-network
    depends_on:
      - backend
    restart: unless-stopped

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: facilita-nginx
    ports:
      - "8090:80"
    depends_on:
      - frontend
      - backend
    networks:
      - facilita-network
    restart: unless-stopped

networks:
  facilita-network:
    driver: bridge

volumes:
  postgres_data:
